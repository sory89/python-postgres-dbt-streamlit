version: 2

models:
  - name: stg_employees
    description: "Nettoyage et standardisation des employés."
    columns:
      - name: employee_id
        tests:
          - not_null
          - unique
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: hired_date
        tests:
          - not_null

  - name: stg_products
    description: "Nettoyage et standardisation du catalogue produits."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_name
        tests:
          - not_null

  - name: stg_promotions
    description: "Nettoyage et standardisation des promotions."
    columns:
      - name: promotion_id
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
      - name: promotion_start_date
        tests:
          - not_null
      - name: promotion_end_date
        tests:
          - not_null

  - name: stg_sales
    description: "Entêtes de vente typées pour l'analyse."
    columns:
      - name: sales_id
        tests:
          - not_null
          - unique
      - name: employee_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['cash', 'credit_card', 'debit_card']

  - name: stg_sales_lines
    description: "Lignes de vente typées au grain ligne de ticket."
    columns:
      - name: sales_line_id
        tests:
          - not_null
          - unique
      - name: sales_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: quantity_sold
        tests:
          - not_null

  - name: stg_shifts
    description: "Planning transformé en créneaux horaires exploitables."
    columns:
      - name: shift_id
        tests:
          - not_null
          - unique
      - name: employee_id
        tests:
          - not_null
      - name: shift_date
        tests:
          - not_null